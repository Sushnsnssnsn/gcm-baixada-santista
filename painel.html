<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel - GCM Baixada Santista</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body{font-family:Arial,Helvetica,sans-serif;background:#0b1220;color:#f5f5f5;line-height:1.7;}
    header{background:linear-gradient(135deg,#07111f,#0f2d4a);padding:60px 20px;text-align:center;border-bottom:4px solid #d4af37;position:relative;}
    h1,h2,h3{color:#d4af37;}
    nav{background:#09111f;padding:15px;text-align:center;position:sticky;top:0;z-index:20;}
    nav a,nav button{color:#fff;background:transparent;border:0;text-decoration:none;margin:0 10px;font-weight:bold;cursor:pointer;font-size:1rem;}
    nav a:hover,nav button:hover{color:#d4af37;}
    main{max-width:1050px;margin:auto;padding:35px 20px;}
    .card{background:#111c2f;border:1px solid #223653;border-radius:14px;padding:22px;margin-bottom:20px;box-shadow:0 12px 28px rgba(0,0,0,.28);}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:18px;}
    .option{background:#13223a;border-left:4px solid #d4af37;border-radius:12px;padding:18px;}
    .option a,.btn{display:inline-block;color:#111;background:#d4af37;font-weight:bold;text-decoration:none;padding:10px 14px;border-radius:8px;margin-top:8px;}
    .alerta{background:#2f2411;border:1px solid #d4af37;color:#ffe9a6;border-radius:12px;padding:18px;}
    .avatar{width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid #d4af37;margin-bottom:12px;}
  </style>
</head>
<body>
<header>
  <h1>Painel GCM</h1>
  <p>Guarda Civil Metropolitana - Baixada Santista</p>
</header>

<nav>
  <a href="index.html">Início</a>
  <a href="prisao.html">Prisões</a>
  <a href="formulario.html">Formulário</a>
  <button onclick="gcmLogout()">Sair</button>
</nav>

<main id="conteudo">
  <div class="card">
    <h2>Carregando...</h2>
    <p>Verificando login com Discord.</p>
  </div>
</main>


<script id="gcm-auth-script">
const GCM_API = 'https://backend-gcm-1.onrender.com';

function gcmToken(){
  return localStorage.getItem('gcm_token');
}

function gcmSaveTokenFromUrl(){
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  if(token){
    localStorage.setItem('gcm_token', token);
    params.delete('token');
    const novaUrl = window.location.pathname + (params.toString() ? '?' + params.toString() : '') + window.location.hash;
    window.history.replaceState({}, document.title, novaUrl);
  }
}

async function gcmMe(){
  const token = gcmToken();
  if(!token) return null;

  const res = await fetch(GCM_API + '/me', {
    headers: { 'Authorization': 'Bearer ' + token }
  });

  if(!res.ok){
    localStorage.removeItem('gcm_token');
    return null;
  }

  return await res.json();
}

function gcmAvatarUrl(user){
  if(user && user.avatar){
    return `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=128`;
  }
  return 'https://cdn.discordapp.com/embed/avatars/0.png';
}

async function gcmRenderUserBox(){
  gcmSaveTokenFromUrl();

  const header = document.querySelector('header') || document.body;
  if(getComputedStyle(header).position === 'static'){
    header.style.position = 'relative';
  }

  const antigo = document.getElementById('gcm-user-box');
  if(antigo) antigo.remove();

  const data = await gcmMe();

  const box = document.createElement('div');
  box.id = 'gcm-user-box';
  box.className = 'gcm-user-box';

  if(data && data.logged){
    const nome = data.user.global_name || data.user.username || 'Usuário';
    box.innerHTML = `
      <img src="${gcmAvatarUrl(data.user)}" alt="Avatar">
      <span>${nome}</span>
      <a href="painel.html">Painel</a>
      <button type="button" onclick="gcmLogout()">Sair</button>
    `;
  } else {
    box.innerHTML = `
      <a href="login.html">Login</a>
      <a href="painel.html">Painel</a>
    `;
  }

  header.prepend(box);
}

function gcmLogout(){
  localStorage.removeItem('gcm_token');
  window.location.href = 'login.html';
}

document.addEventListener('DOMContentLoaded', gcmRenderUserBox);
</script>

<script>
function avatarUrl(user){
  if(user && user.avatar){
    return `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=128`;
  }
  return 'https://cdn.discordapp.com/embed/avatars/0.png';
}

async function carregarPainel(){
  const conteudo = document.getElementById('conteudo');
  gcmSaveTokenFromUrl();

  const data = await gcmMe();

  if(!data || !data.logged){
    conteudo.innerHTML = `
      <div class="card">
        <h2>Você não está logado</h2>
        <p>Entre com Discord para acessar o painel.</p>
        <a class="btn" href="login.html">Fazer login</a>
      </div>
    `;
    return;
  }

  const nome = data.user.global_name || data.user.username || 'Usuário';
  const inServer = data.inServer === true;
  const hasRole = data.hasRole === true;

  if(!inServer){
    conteudo.innerHTML = `
      <div class="card">
        <img class="avatar" src="${avatarUrl(data.user)}">
        <h2>Olá, ${nome}</h2>
        <div class="alerta">Você ainda não está no servidor da GCM.</div>
        <a class="btn" href="${data.invite}" target="_blank">Entrar no Discord</a>
      </div>
    `;
    return;
  }

  if(!hasRole){
    conteudo.innerHTML = `
      <div class="card">
        <img class="avatar" src="${avatarUrl(data.user)}">
        <h2>Olá, ${nome}</h2>
        <p>Você está no servidor, mas ainda não possui o cargo autorizado. Você pode acessar o formulário do concurso.</p>
      </div>
      <div class="grid">
        <div class="option">
          <h3>Formulário</h3>
          <p>Acesse o formulário do concurso.</p>
          <a href="formulario.html">Abrir formulário</a>
        </div>
        <div class="option">
          <h3>Discord</h3>
          <p>Solicite suporte ou acompanhe informações no servidor.</p>
          <a href="${data.invite}" target="_blank">Abrir Discord</a>
        </div>
      </div>
    `;
    return;
  }

  conteudo.innerHTML = `
    <div class="card">
      <img class="avatar" src="${avatarUrl(data.user)}">
      <h2>Bem-vindo, ${nome}</h2>
      <p>Acesso autorizado. Você possui o cargo necessário para opções internas da GCM.</p>
    </div>
    <div class="grid">
      <div class="option">
        <h3>Registrar Prisão</h3>
        <p>Acesse a área de registros de prisões.</p>
        <a href="prisao.html">Abrir prisões</a>
      </div>
      <div class="option">
        <h3>Relatórios</h3>
        <p>Área reservada para relatórios operacionais futuros.</p>
        <a href="#">Em desenvolvimento</a>
      </div>
      <div class="option">
        <h3>Apreensões</h3>
        <p>Sistema de apreensões poderá ser integrado ao Discord.</p>
        <a href="#">Em desenvolvimento</a>
      </div>
    </div>
  `;
}

document.addEventListener('DOMContentLoaded', carregarPainel);
</script>
</body>
</html>
