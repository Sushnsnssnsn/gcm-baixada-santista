<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - GCM Baixada Santista</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top left, rgba(212,175,55,.14), transparent 35%), #0b1220;
      color: #f5f5f5;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .card {
      max-width: 520px;
      width: 100%;
      background: #111c2f;
      border: 1px solid #223653;
      border-radius: 16px;
      padding: 32px;
      text-align: center;
      box-shadow: 0 18px 40px rgba(0,0,0,.35);
      animation: fadeUp .7s ease both;
    }
    h1 { color: #d4af37; margin-bottom: 10px; text-transform: uppercase; }
    p { color: #dbeafe; margin-bottom: 22px; }
    a.btn {
      display: inline-block;
      background: #5865F2;
      color: white;
      text-decoration: none;
      padding: 14px 22px;
      border-radius: 10px;
      font-weight: bold;
      transition: transform .2s ease, filter .2s ease;
    }
    a.btn:hover { transform: translateY(-2px); filter: brightness(1.08); }
    .voltar {
      display: block;
      margin-top: 18px;
      color: #d4af37;
      text-decoration: none;
      font-weight: bold;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Login GCM</h1>
    <p>Entre com sua conta do Discord para acessar o painel da GCM Baixada Santista.</p>
    <a class="btn" href="https://backend-gcm-1.onrender.com/auth/discord">Entrar com Discord</a>
    <a class="voltar" href="index.html">Voltar ao site</a>
  </div>
</body>
</html>
