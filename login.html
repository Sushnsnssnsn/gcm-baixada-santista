<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - GCM Baixada Santista</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body{
      font-family:Arial,Helvetica,sans-serif;
      background:radial-gradient(circle at top left,rgba(212,175,55,.14),transparent 35%),#0b1220;
      color:#f5f5f5;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:20px;
    }
    .card{
      max-width:520px;
      width:100%;
      background:#111c2f;
      border:1px solid #223653;
      border-radius:16px;
      padding:32px;
      text-align:center;
      box-shadow:0 18px 40px rgba(0,0,0,.35);
    }
    h1{color:#d4af37;margin-bottom:10px;text-transform:uppercase;}
    p{color:#dbeafe;margin-bottom:22px;}
    .btn{
      display:inline-block;
      background:#5865F2;
      color:white;
      text-decoration:none;
      padding:14px 22px;
      border-radius:10px;
      font-weight:bold;
      margin:6px;
    }
    .voltar{
      display:block;
      margin-top:18px;
      color:#d4af37;
      text-decoration:none;
      font-weight:bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Login GCM</h1>
    <p>Entre com sua conta do Discord. Depois disso, você ficará logado até clicar em Sair.</p>
    <a class="btn" href="https://backend-gcm-1.onrender.com/auth/discord">Entrar com Discord</a>
    <a class="voltar" href="index.html">Voltar ao site</a>
  </div>

<script id="gcm-auth-script">
const GCM_API = 'https://backend-gcm-1.onrender.com';

function gcmToken(){
  return localStorage.getItem('gcm_token');
}

function gcmSaveTokenFromUrl(){
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  if(token){
    localStorage.setItem('gcm_token', token);
    params.delete('token');
    const novaUrl = window.location.pathname + (params.toString() ? '?' + params.toString() : '') + window.location.hash;
    window.history.replaceState({}, document.title, novaUrl);
  }
}

async function gcmMe(){
  const token = gcmToken();
  if(!token) return null;

  const res = await fetch(GCM_API + '/me', {
    headers: { 'Authorization': 'Bearer ' + token }
  });

  if(!res.ok){
    localStorage.removeItem('gcm_token');
    return null;
  }

  return await res.json();
}

function gcmAvatarUrl(user){
  if(user && user.avatar){
    return `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=128`;
  }
  return 'https://cdn.discordapp.com/embed/avatars/0.png';
}

async function gcmRenderUserBox(){
  gcmSaveTokenFromUrl();

  const header = document.querySelector('header') || document.body;
  if(getComputedStyle(header).position === 'static'){
    header.style.position = 'relative';
  }

  const antigo = document.getElementById('gcm-user-box');
  if(antigo) antigo.remove();

  const data = await gcmMe();

  const box = document.createElement('div');
  box.id = 'gcm-user-box';
  box.className = 'gcm-user-box';

  if(data && data.logged){
    const nome = data.user.global_name || data.user.username || 'Usuário';
    box.innerHTML = `
      <img src="${gcmAvatarUrl(data.user)}" alt="Avatar">
      <span>${nome}</span>
      <a href="painel.html">Painel</a>
      <button type="button" onclick="gcmLogout()">Sair</button>
    `;
  } else {
    box.innerHTML = `
      <a href="login.html">Login</a>
      <a href="painel.html">Painel</a>
    `;
  }

  header.prepend(box);
}

function gcmLogout(){
  localStorage.removeItem('gcm_token');
  window.location.href = 'login.html';
}

document.addEventListener('DOMContentLoaded', gcmRenderUserBox);
</script>

</body>
</html>
